## General

# exit hyprland
bindo = Super, F9, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# reboot for emergencies or something
bindo = Super, F12, exec, systemctl reboot

# locking
bind  = Super, F1,  exec, loginctl lock-session

# opening terminal
bind  = Super, T,   exec, alacritty


## Layouts

# toggle floating
bind  = Super, V, togglefloating,

# layout controls
bind  = Super, B, layoutmsg, togglesplit 
bind  = Super, N, layoutmsg, swapsplit
bind  = Super, M, layoutmsg, movetoroot

# switch between windows
bind  = Alt, Tab, cyclenext
bind  = Alt Shift, Tab, cyclenext, prev


# Workspaces

# go left and right
bind = Super, 1, workspace, e-1
bind = Super, 2, workspace, e+1

# create new workspace, only if last one is empty
bind = Super, 3, exec, ~/.config/hypr/utils/create_workspace.sh

bind = Super, left, workspace, -1
bind = Super, right, workspace, +1

# moving windows to specific workspaces. only supported till the 10th one
bind = Super SHIFT, 1, movetoworkspacesilent, 1
bind = Super SHIFT, 2, movetoworkspacesilent, 2
bind = Super SHIFT, 3, movetoworkspacesilent, 3
bind = Super SHIFT, 4, movetoworkspacesilent, 4
bind = Super SHIFT, 5, movetoworkspacesilent, 5
bind = Super SHIFT, 6, movetoworkspacesilent, 6
bind = Super SHIFT, 7, movetoworkspacesilent, 7
bind = Super SHIFT, 8, movetoworkspacesilent, 8
bind = Super SHIFT, 9, movetoworkspacesilent, 9
bind = Super SHIFT, 0, movetoworkspacesilent, 10


## Window control

# moving and resizing
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

# kill active window
bind  = Super, K,  killactive,


## Contollers

bind  = Super, TAB, exec, carbon.shell controller run windows

bind  = Super, Q,   exec, carbon.shell controller run launcher
bind  = Super, W,   exec, carbon.shell controller run networker
bind  = Super, R,   exec, carbon.shell controller run runner

bind  = Super, I,   exec, carbon.shell controller run theme
bind  = Super, O,   exec, carbon.controller player
bind  = Super, P,   exec, carbon.shell controller run power

bind  = Super, A,   exec, carbon.shell controller run clipboard
bind  = Super, S,   exec, carbon.shell controller run screenshot



## Screenshot

# take a screenshot of the active screen (instantly)
bind = , PRINT,            exec, hyprshot -m active -m output -o ~/Pictures

# take a screenshot of a window
bind = Super, PRINT,       exec, hyprshot -m active -m window -o ~/Pictures

# take a screenshot of a region
bind = Super SHIFT, PRINT, exec, hyprshot -m region -o ~/Pictures


## Control

bindel = ,XF86AudioRaiseVolume,  exec, carbon.audio increase 5
bindel = ,XF86AudioLowerVolume,  exec, carbon.audio decrease 5
bindel = ,XF86AudioMute,         exec, carbon.audio toggle-mute
bindel = ,XF86AudioMicMute,      exec, carbon.audio toggle-mic

bindel = ,XF86MonBrightnessUp,   exec, carbon.brightness increase 10
bindel = ,XF86MonBrightnessDown, exec, carbon.brightness decrease 10

bindl = , XF86AudioNext,         exec, playerctl next
bindl = , XF86AudioPause,        exec, playerctl play-pause
bindl = , XF86AudioPlay,         exec, playerctl play-pause
bindl = , XF86AudioPrev,         exec, playerctl previous


