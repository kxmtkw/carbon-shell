#  ‚Ėą‚Ėą ‚Ėą‚Ėą ‚ĖÄ‚Ėą‚Ėą‚Ėą‚ĖÄ ‚Ėą‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ‚Ėą‚Ėą‚ĖÄ 


# ignore maximize requests
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# fix wayland issues
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# apps with default float
windowrule =  match:class org.kde.gwenview,  float on
windowrule =  match:class org.kde.haruna,    float on
windowrule =  match:class org.kde.kcalc,     float on
windowrule =  match:class org.kde.kclock,    float on
windowrule =  match:class org.kde.calindori, float on
windowrule =  match:class org.kde.kamoso,    float on

windowrule =  match:class nm-connection-editor, float on
windowrule =  match:class blueman-manager, float on
windowrule =  match:title Open File, float on
windowrule =  match:title Save As, float on

# rofi fixes
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.1, match:namespace rofi
layerrule = animation popin 60%, match:namespace rofi


layerrule = animation slide, match:namespace quickshell

# don't idle on fullscreen
windowrule = match:class .*, idle_inhibit fullscreen



#  ‚ĖĄ‚ĖĄ     ‚ĖĄ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ 
