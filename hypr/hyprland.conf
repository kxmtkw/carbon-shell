#  ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą ‚ĖÄ‚Ėą‚Ėą‚Ėą‚ĖÄ   ‚Ėą‚Ėą  ‚ĖÄ‚Ėą‚Ėą‚Ėą‚ĖÄ ‚ĖĄ‚ĖĄ‚Ėą‚Ėą‚ĖÄ   ‚Ėą‚Ėą  ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą ‚Ėą‚Ėą ‚Ėą‚Ėą   ‚Ėą‚Ėą  

# polkit agent
exec-once = systemctl --user start hyprpolkitagent  
# wallpaper daemon
exec-once = swww-daemon
# idle daemon
exec-once = hypridle
# clipboard daemon
exec-once = wl-paste --watch cliphist store
# shell start
exec-once = carbon.shell daemon start


