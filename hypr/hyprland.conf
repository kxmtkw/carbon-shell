monitor = ,preferred,auto,1


                           
#   ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ    ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ 
#  ‚Ėą‚Ėą‚Ėą‚ĖĄ‚ĖĄ   ‚Ėą‚Ėą   ‚ĖÄ‚Ėą‚Ėą‚Ėą‚ĖÄ ‚Ėą‚Ėą    ‚Ėą‚Ėą‚ĖĄ‚ĖĄ  
#  ‚ĖĄ‚ĖĄ‚Ėą‚Ėą‚ĖÄ   ‚Ėą‚Ėą     ‚Ėą   ‚Ėą‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ‚ĖĄ‚ĖĄ 

# TODO: Replace the fixed constants with variables or something

general {
    border_size = 0
    gaps_in = 6
    gaps_out = 10
    col.active_border = rgb(40484b)
    col.inactive_border = rgba(40484b40)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
    snap {
        enabled = true
    }
}


decoration {
    rounding = 16
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    dim_around = 0.08
    dim_modal = true
    dim_inactive = true
    dim_strength = 0.15


    blur {
        enabled = true
        size = 5
        passes = 2
        noise = 0.0025
        vibrancy = 10
        popups = true
    }


    shadow {
        enabled = true
        color = rgba(111111aa)
        range = 10
    }

    
}

                                                   
#   ‚ĖĄ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ   ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ 
#  ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą‚ĖĄ‚Ėą‚Ėą ‚Ėą‚Ėą ‚Ėą‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚Ėą ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą  ‚Ėą‚Ėą   ‚Ėą‚Ėą ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą‚ĖĄ‚Ėą‚Ėą ‚Ėą‚Ėą‚Ėą‚ĖĄ‚ĖĄ 
#  ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą ‚Ėą‚Ėą ‚ĖÄ‚Ėą‚Ėą ‚Ėą‚Ėą ‚Ėą‚Ėą   ‚Ėą‚Ėą ‚Ėą‚Ėą‚ĖÄ‚Ėą‚Ėą  ‚Ėą‚Ėą   ‚Ėą‚Ėą ‚ĖÄ‚Ėą‚Ėą‚Ėą‚ĖÄ ‚Ėą‚Ėą ‚ĖÄ‚Ėą‚Ėą ‚ĖĄ‚ĖĄ‚Ėą‚Ėą‚ĖÄ 
          
                                              
animations {
    enabled = true

    bezier = EaseInOutCubic,  0.65, 0, 0.35, 1
    bezier = EaseOutBack,     0.34, 1.56, 0.64, 1

    animation = global,        1,     3,     EaseInOutCubic
    animation = border,        1,     5,     EaseInOutCubic      
    animation = windows,       1,     2.5,   EaseInOutCubic,
    animation = layers,        1,     3.5,   EaseOutBack,         fade
    animation = fadeLayers,    1,     3,     EaseInOutCubic
    animation = workspaces,    1,     3,     EaseInOutCubic,      fade
    animation = zoomFactor,    1,     7.0,   EaseInOutCubic
}


