# Main hyprland config for the carbon shell/
# This file is built-in and should NOT be modified by the user.       

# If you want to make any personal changes:
#   - Create a override.conf next to this file and make your changes there.
#   - Hyprviz also works and you can use it without affecting the main config

      
#  ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ  ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ ‚ĖĄ‚ĖĄ 
